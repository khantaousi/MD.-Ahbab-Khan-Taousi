
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .bg-gradient-mesh {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,91%,10%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(199,89%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(210,100%,10%,1) 0, transparent 50%);
        }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.2); }
        .neon-text { text-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
        
        /* Premium Hover Animations */
        button, a, input[type="submit"] {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .btn-hover-effect:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.1);
        }
        .btn-hover-effect:active {
            transform: translateY(0) scale(0.96);
        }

        /* Light Mode Overrides */
        .theme-light {
            background-color: #f8fafc !important;
            background-image: none !important;
            color: #0f172a !important;
        }
        .theme-light .bg-slate-950 {
            background-color: #f1f5f9 !important;
        }
        .theme-light .bg-slate-950\/98 {
            background-color: rgba(241, 245, 249, 0.98) !important;
        }
        .theme-light .bg-slate-950\/70 {
            background-color: rgba(241, 245, 249, 0.7) !important;
        }
        .theme-light .bg-slate-950\/50 {
            background-color: rgba(241, 245, 249, 0.5) !important;
        }
        .theme-light .bg-slate-950\/80 {
            background-color: rgba(241, 245, 249, 0.8) !important;
        }
        .theme-light .bg-slate-900 {
            background-color: #e2e8f0 !important;
        }
        .theme-light .bg-slate-900\/60 {
            background-color: rgba(226, 232, 240, 0.6) !important;
        }
        .theme-light .bg-slate-900\/50 {
            background-color: rgba(226, 232, 240, 0.5) !important;
        }
        .theme-light .bg-slate-800 {
            background-color: #cbd5e1 !important;
        }
        .theme-light .border-slate-950 {
            border-color: #f1f5f9 !important;
        }
        .theme-light .border-slate-950\/50 {
            border-color: rgba(241, 245, 249, 0.5) !important;
        }
        .theme-light .text-white,
        .theme-light .text-slate-100,
        .theme-light .hover\:text-white:hover {
            color: #0f172a !important;
        }
        .theme-light .text-white\/50 {
            color: rgba(15, 23, 42, 0.5) !important;
        }
        .theme-light .text-slate-400,
        .theme-light .text-slate-300 {
            color: #475569 !important;
        }
        .theme-light .border-white\/10,
        .theme-light .border-white\/5,
        .theme-light .border-white\/20,
        .theme-light .border-white\/30,
        .theme-light .border-white\/40 {
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        .theme-light .bg-white\/5,
        .theme-light .bg-white\/10 {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }
        .theme-light .hover\:bg-white\/10:hover {
            background-color: rgba(0, 0, 0, 0.1) !important;
        }
        .theme-light .hover\:border-white\/20:hover,
        .theme-light .hover\:border-white\/30:hover,
        .theme-light .hover\:border-white\/40:hover {
            border-color: rgba(0, 0, 0, 0.2) !important;
        }
        .theme-light .glass {
            background: rgba(255, 255, 255, 0.7) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        .theme-light .shadow-3xl {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1) !important;
        }
        
        /* Event Banner Light Theme Overrides */
        .theme-light .from-yellow-200 {
            --tw-gradient-from: #2563eb var(--tw-gradient-from-position) !important;
            --tw-gradient-to: rgb(37 99 235 / 0) var(--tw-gradient-to-position) !important;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
        }
        .theme-light .via-yellow-400 {
            --tw-gradient-to: rgb(250 204 21 / 0) var(--tw-gradient-to-position) !important;
            --tw-gradient-stops: var(--tw-gradient-from), #4f46e5 var(--tw-gradient-via-position), var(--tw-gradient-to) !important;
        }
        .theme-light .to-yellow-200 {
            --tw-gradient-to: #2563eb var(--tw-gradient-to-position) !important;
        }
        .theme-light .text-yellow-400,
        .theme-light .text-yellow-200,
        .theme-light .text-yellow-100 {
            color: #4f46e5 !important;
        }
        .theme-light .bg-yellow-200 {
            background-color: #4f46e5 !important;
        }
        .theme-light .via-yellow-500 {
            --tw-gradient-to: rgb(234 179 8 / 0) var(--tw-gradient-to-position) !important;
            --tw-gradient-stops: var(--tw-gradient-from), #4f46e5 var(--tw-gradient-via-position), var(--tw-gradient-to) !important;
        }
    </style>

</html>
